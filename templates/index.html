<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveRider SDR (Python)</title>
  <style>
    :root {
      --bg: #0c1116;
      --panel: #16202b;
      --panel-2: #1d2a38;
      --text: #dfe7ef;
      --muted: #9db2c8;
      --accent: #2cc7b7;
      --danger: #f86f57;
      --line: #2f4256;
    }

    :root.light-mode {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --panel-2: #f9f9f9;
      --text: #1a1a1a;
      --muted: #666666;
      --accent: #00a89d;
      --danger: #d84e44;
      --line: #dddddd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top right, #1a2938 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      transition: background-color 200ms ease, color 200ms ease;
    }

    :root.light-mode body {
      background: radial-gradient(circle at top right, #e0e0e0 0%, var(--bg) 55%);
    }

    .layout {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header h2 {
      margin: 0;
      font-size: 0.98rem;
      letter-spacing: 0.04em;
    }

    .pane {
      padding: 12px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: end;
    }

    .control {
      min-width: 150px;
      flex: 1 1 180px;
    }

    .control label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    input, select, button {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #101923;
      color: var(--text);
      padding: 10px;
      font-size: 0.92rem;
    }

    button {
      cursor: pointer;
      font-weight: 600;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-start { background: linear-gradient(135deg, #1aa88f, var(--accent)); }
    .btn-stop { background: linear-gradient(135deg, #d84e44, var(--danger)); }
    .btn-primary { background: linear-gradient(135deg, #0066cc, #0052a3); }
    .btn-danger { background: linear-gradient(135deg, #cc0000, #990000); }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr;
    }

    canvas {
      width: 100%;
      display: block;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--line);
    }

    #waveform { height: 180px; }
    #waterfall { height: 320px; image-rendering: pixelated; }

    .status {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .status-warning {
      width: 100%;
      color: #ffb570;
    }

    #sparklineWrap {
      width: 100%;
      margin-top: 4px;
    }

    #sparklineWrap canvas {
      display: block;
      width: 100%;
      height: 48px;
      border-radius: 4px;
      background: var(--bg);
      border: 1px solid var(--line);
    }

    .status-chip {
      display: inline-block;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      min-width: 210px;
    }

    .status-chip.recording {
      border-color: #d84e44;
      background: rgba(216, 78, 68, 0.12);
    }

    .status-chip.iq {
      border-color: #7b2fc9;
      background: rgba(123, 47, 201, 0.12);
    }

    .scan-header {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .scan-badge {
      font-size: 0.78rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 10px;
      color: var(--muted);
      background: var(--panel-2);
    }

    .scan-progress {
      margin-top: 8px;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--bg);
      display: none;
    }

    .scan-progress > div {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #2cc7b7, #1aa88f);
      transition: width 180ms ease;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: 360px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 2000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .theme-toggle {
      background: linear-gradient(135deg, #2a3f5f, #1a2f4f);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.82rem;
      transition: all 120ms ease;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(44, 199, 183, 0.2);
    }

    .theme-toggle.active {
      background: linear-gradient(135deg, var(--accent), #1aa88f);
      color: #0c1116;
    }

    :root.light-mode .theme-toggle.active {
      background: linear-gradient(135deg, var(--accent), #00a89d);
      color: white;
    }

    .search-container {
      position: relative;
    }

    .band-search {
      width: 100%;
    }

    .band-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-top: none;
      border-radius: 0 0 8px 8px;
      max-height: 250px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
    }

    .band-dropdown.show {
      display: block;
    }

    .band-option {
      padding: 10px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--line);
      color: var(--text);
      font-size: 0.88rem;
    }

    .band-option:hover {
      background: var(--panel-2);
    }

    .band-option.selected {
      background: var(--accent);
      color: var(--bg);
    }

    .center-freq-btn {
      background: linear-gradient(135deg, #3a7f7f, #2a6f6f);
      border: 1px solid var(--accent);
    }

    .center-freq-btn:hover {
      box-shadow: inset 0 0 8px rgba(44, 199, 183, 0.3);
    }

    .connection-info {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .connection-info.connected {
      border-color: var(--accent);
      background: linear-gradient(135deg, rgba(44, 199, 183, 0.05), rgba(44, 199, 183, 0.02));
    }

    .connection-info strong {
      color: var(--accent);
    }

    .log-panel {
      background: #05090f;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    :root.light-mode .log-panel {
      background: #fafafa;
    }

    .log-header {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
      align-items: center;
    }

    .log-filter {
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font-size: 0.78rem;
      flex: 0 1 auto;
    }

    .log-filter.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .log-messages {
      height: 200px;
      overflow-y: auto;
      font-family: "Courier New", monospace;
      font-size: 0.78rem;
      padding: 10px;
      background: var(--panel);
    }

    .log-entry {
      margin-bottom: 4px;
      padding: 4px;
      border-left: 3px solid transparent;
      color: var(--muted);
    }

    .log-entry.debug {
      border-left-color: #6b7280;
      color: #6b7280;
    }

    .log-entry.info {
      border-left-color: var(--accent);
      color: var(--accent);
    }

    .log-entry.warning {
      border-left-color: #ffb570;
      color: #ffb570;
    }

    .log-entry.error {
      border-left-color: var(--danger);
      color: var(--danger);
    }

    .log-clear-btn {
      padding: 6px 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.78rem;
      margin-left: auto;
    }

    .log-clear-btn:hover {
      background: var(--panel-2);
    }

    @media (max-width: 760px) {
      .layout { margin: 12px auto; }
      #waveform { height: 150px; }
      #waterfall { height: 250px; }
      .log-messages { height: 150px; }
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="card">
      <div class="card-header">
        <h2>WaveRider SDR (Python Web)</h2>
        <div style="display: flex; gap: 12px; align-items: center;">
          <div id="runState">Stopped</div>
          <button id="themeToggle" class="theme-toggle">🌙 Dark</button>
        </div>
      </div>
      <div class="pane" id="connectionInfo" style="margin-bottom: 12px; display: none;">
      </div>
      <div class="pane">
        <div class="row">
          <div class="control">
            <label>Band (Search)</label>
            <div class="search-container">
              <input id="bandSearch" type="text" placeholder="Search bands..." class="band-search" />
              <div id="bandDropdown" class="band-dropdown"></div>
            </div>
          </div>
          <div class="control">
            <label>Center Frequency (MHz)</label>
            <input id="frequency" type="number" step="0.1" value="100" />
          </div>
          <div class="control"><button id="centerFreqBtn" class="center-freq-btn">📍 Center</button></div>
          <div class="control">
            <label>Sample Rate (Hz)</label>
            <select id="sampleRate">
              <option value="2400000">2.4M (RTL-SDR)</option>
              <option value="2048000">2.048M</option>
              <option value="1200000">1.2M</option>
              <option value="1024000">1.024M</option>
              <option value="960000">960k</option>
              <option value="500000">500k</option>
            </select>
          </div>
          <div class="control">
            <label>FFT Size</label>
            <select id="fftSize">
              <option>512</option>
              <option selected>1024</option>
              <option>2048</option>
              <option>4096</option>
            </select>
          </div>
          <div class="control">
            <label>Modulation</label>
            <select id="modulation">
              <option>None</option>
              <option>AM</option>
              <option>FM</option>
              <option>USB</option>
              <option>LSB</option>
              <option>CW</option>
            </select>
          </div>
          <div class="control">
            <label>Bandwidth <span id="bandwidthLabel" style="color:var(--accent); font-weight:600;">Off</span></label>
            <input id="bandwidth" type="range" min="0" max="500000" step="500" value="0" style="width:120px;" />
          </div>
          <div class="control" style="align-self:flex-end;">
            <button id="bwDefaultBtn" style="font-size:11px; padding:4px 8px;">Mode Default</button>
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <div class="control"><button id="startBtn" class="btn-start">Start</button></div>
          <div class="control"><button id="stopBtn" class="btn-stop">Stop</button></div>
          <div class="control"><button id="recordBtn" class="btn-primary">🔴 Record</button></div>
          <div class="control"><button id="stopRecordBtn" class="btn-danger" style="display:none;">⏹ Stop Record</button></div>
          <div id="recordStatus" class="status-chip recording" style="display:none;"></div>
          <div class="control"><button id="iqRecordBtn" class="btn-primary" style="background: linear-gradient(135deg, #7b2fc9, #5a1f9a);">📡 IQ Record</button></div>
          <div class="control"><button id="stopIqBtn" class="btn-danger" style="display:none;">⏹ Stop IQ</button></div>
          <div id="iqStatus" class="status-chip iq" style="display:none;"></div>
        </div>

        <div class="row" style="margin-top:12px;">
          <div class="control">
            <label>Min dB</label>
            <input id="minDb" type="number" value="-80" />
          </div>
          <div class="control">
            <label>Max dB</label>
            <input id="maxDb" type="number" value="0" />
          </div>
          <div class="control">
            <label>Squelch dB</label>
            <input id="squelch" type="number" value="-50" />
          </div>
          <div class="control">
            <label>Noise Blanker</label>
            <select id="noiseBlanker">
              <option value="false">Off</option>
              <option value="true">On</option>
            </select>
          </div>
          <div class="control">
            <label>NB Threshold <span id="nbThreshLabel" style="color:var(--accent); font-weight:600;">3.0×</span></label>
            <input id="nbThreshold" type="range" min="1.5" max="10" step="0.5" value="3" style="width:90px;" />
          </div>
          <div class="control">
            <label>PPM Correction <span id="ppmLabel" style="color:var(--accent); font-weight:600;">0</span></label>
            <input id="ppmCorrection" type="range" min="-100" max="100" step="1" value="0" style="width:120px;" />
          </div>
          <div class="control">
            <label>Morse Decoder</label>
            <select id="morseEnabled">
              <option value="false">Disabled</option>
              <option value="true">Enabled</option>
            </select>
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <div class="control">
            <label>SDR Device</label>
            <select id="sdrDeviceSelect"></select>
          </div>
          <div class="control"><button id="scanSdrBtn">Scan SDR</button></div>
          <div class="control"><button id="connectSdrBtn">Connect SDR</button></div>
          <div class="control"><button id="disconnectSdrBtn">Disconnect SDR</button></div>
        </div>
      </div>
    </section>

    <!-- ── Frequency Scanner ─────────────────────────────────────────── -->
    <section class="card">
      <div class="card-header">
        <h2>Frequency Scanner</h2>
        <div class="scan-header">
          <span id="scanBadge" class="scan-badge">Ready</span>
          <span id="scanStatus" style="font-size:0.85rem; color:var(--muted);">Idle</span>
        </div>
      </div>
      <div class="pane">
        <div class="row">
          <div class="control">
            <label>Start (MHz)</label>
            <input id="scanStart" type="number" step="0.1" value="88" style="width:90px;" />
          </div>
          <div class="control">
            <label>Stop (MHz)</label>
            <input id="scanStop" type="number" step="0.1" value="108" style="width:90px;" />
          </div>
          <div class="control">
            <label>Step (kHz)</label>
            <input id="scanStep" type="number" step="1" value="100" min="1" style="width:80px;" />
          </div>
          <div class="control">
            <label>Dwell (ms)</label>
            <input id="scanDwell" type="number" step="10" value="200" min="50" max="10000" style="width:80px;" />
          </div>
          <div class="control">
            <label>Pause on Signal</label>
            <select id="scanPause">
              <option value="true">Yes</option>
              <option value="false">No</option>
            </select>
          </div>
          <div class="control" style="align-self:flex-end;">
            <button id="scanStartBtn" class="btn-primary">▶ Start Scan</button>
          </div>
          <div class="control" style="align-self:flex-end;">
            <button id="scanStopBtn" class="btn-danger" style="display:none;">⏹ Stop Scan</button>
          </div>
        </div>
        <div id="scanInfo" style="margin-top:6px; font-size:0.82rem; color:var(--muted); display:none;"></div>
        <div class="scan-progress" id="scanProgress"><div id="scanProgressFill"></div></div>
      </div>
    </section>

    <section class="card grid">
      <div class="pane">
        <canvas id="waveform" width="1100" height="180"></canvas>
      </div>
      <div class="pane">
        <canvas id="waterfall" width="1100" height="320"></canvas>
      </div>
      <div class="pane status" id="statusText">
        <span>Mode: None</span>
        <span>Morse: </span>
        <span>Source: Simulated</span>
        <span>Signal: -120.0 dB</span>
        <span id="squelchIndicator"></span>
        <span>Meshtastic: none</span>
      </div>
      <div id="sparklineWrap">
        <canvas id="sparkline" height="48"></canvas>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Log Messages</h2>
      </div>
      <div class="log-header">
        <button class="log-filter active" data-level="*">All</button>
        <button class="log-filter" data-level="debug">Debug</button>
        <button class="log-filter" data-level="info">Info</button>
        <button class="log-filter" data-level="warning">Warning</button>
        <button class="log-filter" data-level="error">Error</button>
        <button class="log-clear-btn" id="logClearBtn">Clear</button>
      </div>
      <div class="log-messages" id="logMessages"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    // ========== Theme Management ==========
    const themeToggle = document.getElementById("themeToggle");
    const html = document.documentElement;
    const savedTheme = localStorage.getItem("theme") || "dark";
    
    function setTheme(theme) {
      if (theme === "light") {
        html.classList.add("light-mode");
        themeToggle.textContent = "☀️ Light";
        localStorage.setItem("theme", "light");
      } else {
        html.classList.remove("light-mode");
        themeToggle.textContent = "🌙 Dark";
        localStorage.setItem("theme", "dark");
      }
    }
    
    setTheme(savedTheme);
    themeToggle.addEventListener("click", () => {
      const isLight = html.classList.contains("light-mode");
      setTheme(isLight ? "dark" : "light");
    });

    // ========== Canvas & Controls ==========
    const waveformCanvas = document.getElementById("waveform");
    const waterfallCanvas = document.getElementById("waterfall");
    const waveCtx = waveformCanvas.getContext("2d");
    const wfCtx = waterfallCanvas.getContext("2d");

    // Get CSS variables for current theme
    function getThemeColors() {
      const root = document.documentElement;
      const style = getComputedStyle(root);
      return {
        bg: style.getPropertyValue("--bg").trim() || "#0c1116",
        panel: style.getPropertyValue("--panel").trim() || "#16202b",
        line: style.getPropertyValue("--line").trim() || "#2f4256",
        accent: style.getPropertyValue("--accent").trim() || "#2cc7b7",
        text: style.getPropertyValue("--text").trim() || "#dfe7ef"
      };
    }

    const controls = {
      frequency: document.getElementById("frequency"),
      sampleRate: document.getElementById("sampleRate"),
      fftSize: document.getElementById("fftSize"),
      modulation: document.getElementById("modulation"),
      bandwidth: document.getElementById("bandwidth"),
      bandwidthLabel: document.getElementById("bandwidthLabel"),
      bwDefaultBtn: document.getElementById("bwDefaultBtn"),
      minDb: document.getElementById("minDb"),
      maxDb: document.getElementById("maxDb"),
      squelch: document.getElementById("squelch"),
      morseEnabled: document.getElementById("morseEnabled"),
      bandSearch: document.getElementById("bandSearch"),
      bandDropdown: document.getElementById("bandDropdown"),
      sdrDeviceSelect: document.getElementById("sdrDeviceSelect"),
      scanSdrBtn: document.getElementById("scanSdrBtn"),
      connectSdrBtn: document.getElementById("connectSdrBtn"),
      disconnectSdrBtn: document.getElementById("disconnectSdrBtn"),
      centerFreqBtn: document.getElementById("centerFreqBtn"),
      runState: document.getElementById("runState"),
      statusText: document.getElementById("statusText"),
      connectionInfo: document.getElementById("connectionInfo"),
      noise_blanker: document.getElementById("noiseBlanker"),
      nbThreshold: document.getElementById("nbThreshold"),
      nbThreshLabel: document.getElementById("nbThreshLabel"),
      ppmCorrection: document.getElementById("ppmCorrection"),
      ppmLabel: document.getElementById("ppmLabel"),
      squelchIndicator: document.getElementById("squelchIndicator"),
      logMessages: document.getElementById("logMessages"),
      logClearBtn: document.getElementById("logClearBtn"),
      // Scanner controls
      scanStart: document.getElementById("scanStart"),
      scanStop: document.getElementById("scanStop"),
      scanStep: document.getElementById("scanStep"),
      scanDwell: document.getElementById("scanDwell"),
      scanPause: document.getElementById("scanPause"),
      scanStartBtn: document.getElementById("scanStartBtn"),
      scanStopBtn: document.getElementById("scanStopBtn"),
      scanStatus: document.getElementById("scanStatus"),
      scanInfo: document.getElementById("scanInfo"),
      scanBadge: document.getElementById("scanBadge"),
      scanProgress: document.getElementById("scanProgress"),
      scanProgressFill: document.getElementById("scanProgressFill"),
    };

    function showToast(message, level = "info") {
      const t = document.getElementById("toast");
      if (!t) return;
      t.textContent = message;
      t.style.borderColor = level === "error" ? "#d84e44" : "var(--line)";
      t.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => t.classList.remove("show"), 2600);
    }
    showToast._timer = null;

    // ========== Band Management ==========
    let allBands = [];
    
    function showBandDropdown(search = "") {
      const filtered = allBands.filter(b => 
        (b.name + " " + b.mode).toLowerCase().includes(search.toLowerCase())
      );
      
      controls.bandDropdown.innerHTML = filtered
        .map(b => `<div class="band-option" data-band="${b.name}">${b.name} (${b.mode}) - ${(b.start_hz/1e6).toFixed(1)}-${(b.end_hz/1e6).toFixed(1)} MHz</div>`)
        .join("");
      
      controls.bandDropdown.classList.add("show");
      
      document.querySelectorAll(".band-option").forEach(opt => {
        opt.addEventListener("click", async () => {
          controls.bandSearch.value = opt.getAttribute("data-band");
          controls.bandDropdown.classList.remove("show");
          await api("/api/set_band", {
            method: "POST",

    async function api(path, opts = {}) {
      try {
        const res = await fetch(path, {
          headers: { "Content-Type": "application/json" },
          ...opts,
        });
        const text = await res.text();
        try { 
          const json = JSON.parse(text);
          if (!res.ok && json.error) {
            addLog("error", `API error: ${json.error}`);
            showToast(json.error, "error");
          }
          return json;
        } catch { 
          return text; 
        }
      } catch (err) {
        addLog("error", `Network error: ${err.message}`);
        showToast(`Network error: ${err.message}`, "error");
        throw err;
      }
    }

    function dbToY(v, minDb, maxDb, h) {
      const n = (v - minDb) / (maxDb - minDb);
      return h - Math.max(0, Math.min(1, n)) * h;
    }

    function drawWaveform(data, minDb, maxDb) {
      const colors = getThemeColors();
      const w = waveformCanvas.width;
      const h = waveformCanvas.height;
      waveCtx.clearRect(0, 0, w, h);

      waveCtx.strokeStyle = colors.line;
      waveCtx.lineWidth = 1;
      for (let i = 1; i <= 4; i++) {
        const y = (h * i) / 5;
        waveCtx.beginPath();
        waveCtx.moveTo(0, y);
        waveCtx.lineTo(w, y);
        waveCtx.stroke();
      }

      if (!Array.isArray(data) || data.length < 2) {
        return;
      }

      waveCtx.strokeStyle = colors.accent;
      waveCtx.lineWidth = 2;
      waveCtx.beginPath();
      for (let i = 0; i < data.length; i++) {
        const x = (i / (data.length - 1)) * w;
        const y = dbToY(data[i], minDb, maxDb, h);
        if (i === 0) {
          waveCtx.moveTo(x, y);
        } else {
          waveCtx.lineTo(x, y);
        }
      }
      waveCtx.stroke();
    }

    function spectralColor(norm) {
      const x = Math.max(0, Math.min(1, norm));
      const r = Math.round(255 * Math.min(1, x * 2));
      const g = Math.round(255 * Math.sin(Math.PI * x));
      const b = Math.round(255 * (1 - x) * (1 - x));
      return [r, g, b];
    }

    function drawWaterfall(matrix, minDb, maxDb) {
      const colors = getThemeColors();
      if (!Array.isArray(matrix) || !matrix.length || !Array.isArray(matrix[0])) {
        // Clear with background color
        const w = waterfallCanvas.width;
        const h = waterfallCanvas.height;
        wfCtx.fillStyle = colors.bg;
        wfCtx.fillRect(0, 0, w, h);
        return;
      }

      const rows = matrix.length;
      const cols = matrix[0].length;
      const image = wfCtx.createImageData(cols, rows);

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const v = matrix[y][x];
          const n = (v - minDb) / (maxDb - minDb);
          const [r, g, b] = spectralColor(n);
          const idx = (y * cols + x) * 4;
          image.data[idx] = r;
          image.data[idx + 1] = g;
          image.data[idx + 2] = b;
          image.data[idx + 3] = 255;
        }
      }

      const offscreen = document.createElement("canvas");
      offscreen.width = cols;
      offscreen.height = rows;
      const offCtx = offscreen.getContext("2d");
      offCtx.putImageData(image, 0, 0);
      wfCtx.clearRect(0, 0, waterfallCanvas.width, waterfallCanvas.height);
      wfCtx.drawImage(offscreen, 0, 0, waterfallCanvas.width, waterfallCanvas.height);
    }

    // ── Signal Strength Sparkline ──────────────────────────────────────────
    const sparklineCanvas = document.getElementById("sparkline");

    function drawSparkline(history) {
      if (!sparklineCanvas) return;
      const dpr = window.devicePixelRatio || 1;
      const w = sparklineCanvas.offsetWidth || 400;
      const h = 48;
      sparklineCanvas.width = w * dpr;
      sparklineCanvas.height = h * dpr;
      const ctx = sparklineCanvas.getContext("2d");
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, w, h);

      const isDark = !document.documentElement.classList.contains("light-mode");
      const lineColor = isDark ? "#1aa88f" : "#0d8c77";
      const squelchColor = "rgba(216,78,68,0.5)";
      const gridColor = isDark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.08)";

      if (!history || history.length < 2) {
        ctx.fillStyle = isDark ? "rgba(255,255,255,0.25)" : "rgba(0,0,0,0.3)";
        ctx.font = "11px monospace";
        ctx.textAlign = "center";
        ctx.fillText("No history yet", w / 2, h / 2 + 4);
        return;
      }

      const dbs = history.map(p => p[1]);
      const minDb = Math.min(-120, ...dbs);
      const maxDb = Math.max(-20, ...dbs);
      const range = maxDb - minDb || 1;
      const toY = db => h - 4 - ((db - minDb) / range) * (h - 8);

      // Grid lines at -120, -80, -40 dB
      ctx.strokeStyle = gridColor;
      ctx.lineWidth = 1;
      for (const g of [-120, -80, -40]) {
        if (g >= minDb && g <= maxDb) {
          const y = toY(g);
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
        }
      }

      // Squelch line (from last status fetch)
      const sqDb = parseFloat(controls.squelch?.value ?? "-50");
      if (!isNaN(sqDb)) {
        const sy = toY(sqDb);
        ctx.strokeStyle = squelchColor;
        ctx.setLineDash([4, 3]);
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(w, sy); ctx.stroke();
        ctx.setLineDash([]);
      }

      // Signal line
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      history.forEach((p, i) => {
        const x = (p[0] / (history[history.length - 1][0] || 1)) * w;
        const y = toY(p[1]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();

      // Fill under the line
      const lastX = (history[history.length - 1][0] / (history[history.length - 1][0] || 1)) * w;
      ctx.lineTo(lastX, h);
      ctx.lineTo(0, h);
      ctx.closePath();
      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, isDark ? "rgba(26,168,143,0.3)" : "rgba(13,140,119,0.25)");
      grad.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = grad;
      ctx.fill();
    }

    async function refreshSparkline() {
      try {
        const data = await api("/api/signal_history");
        drawSparkline(data.history);
      } catch (_) { /* non-critical */ }
    }

    setInterval(refreshSparkline, 2000);
    refreshSparkline();
    updateScanStatus();

    async function loop() {
      await refreshStatus();
      await refreshFrame();
      setTimeout(loop, 120);
    }

    Promise.all([loadBands(), refreshSdrDevices()]).then(loop);
  </script>
</body>
</html>
