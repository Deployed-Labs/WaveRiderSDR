<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveRider SDR (Rust)</title>
  <style>
    :root {
      --bg: #0c1116;
      --panel: #16202b;
      --panel-2: #1d2a38;
      --text: #dfe7ef;
      --muted: #9db2c8;
      --accent: #2cc7b7;
      --danger: #f86f57;
      --line: #2f4256;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top right, #1a2938 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }

    .layout {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header h2 {
      margin: 0;
      font-size: 0.98rem;
      letter-spacing: 0.04em;
    }

    .pane {
      padding: 12px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: end;
    }

    .control {
      min-width: 150px;
      flex: 1 1 180px;
    }

    .control label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    input, select, button {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #101923;
      color: var(--text);
      padding: 10px;
      font-size: 0.92rem;
    }

    button {
      cursor: pointer;
      font-weight: 600;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-start { background: linear-gradient(135deg, #1aa88f, var(--accent)); }
    .btn-stop { background: linear-gradient(135deg, #d84e44, var(--danger)); }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr;
    }

    canvas {
      width: 100%;
      display: block;
      background: #05090f;
      border-radius: 8px;
      border: 1px solid var(--line);
    }

    #waveform { height: 180px; }
    #waterfall { height: 320px; image-rendering: pixelated; }

    .status {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .status-warning {
      width: 100%;
      color: #ffb570;
    }

    @media (max-width: 760px) {
      .layout { margin: 12px auto; }
      #waveform { height: 150px; }
      #waterfall { height: 250px; }
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="card">
      <div class="card-header">
        <h2>WaveRider SDR (Rust Web)</h2>
        <div id="runState">Stopped</div>
      </div>
      <div class="pane">
        <div class="row">
          <div class="control">
            <label>Band</label>
            <select id="bandSelect"></select>
          </div>
          <div class="control">
            <label>Center Frequency (MHz)</label>
            <input id="frequency" type="number" step="0.1" value="100" />
          </div>
          <div class="control">
            <label>Sample Rate (Hz)</label>
            <select id="sampleRate">
              <option value="2400000">2400000</option>
              <option value="2048000">2048000</option>
              <option value="1024000">1024000</option>
            </select>
          </div>
          <div class="control">
            <label>FFT Size</label>
            <select id="fftSize">
              <option>512</option>
              <option selected>1024</option>
              <option>2048</option>
              <option>4096</option>
            </select>
          </div>
          <div class="control">
            <label>Modulation</label>
            <select id="modulation">
              <option>None</option>
              <option>AM</option>
              <option>FM</option>
              <option>USB</option>
              <option>LSB</option>
              <option>CW</option>
            </select>
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <div class="control"><button id="startBtn" class="btn-start">Start</button></div>
          <div class="control"><button id="stopBtn" class="btn-stop">Stop</button></div>
          <div class="control">
            <label>Min dB</label>
            <input id="minDb" type="number" value="-80" />
          </div>
          <div class="control">
            <label>Max dB</label>
            <input id="maxDb" type="number" value="0" />
          </div>
          <div class="control">
            <label>Squelch dB</label>
            <input id="squelch" type="number" value="-50" />
          </div>
          <div class="control">
            <label>Morse Decoder</label>
            <select id="morseEnabled">
              <option value="false">Disabled</option>
              <option value="true">Enabled</option>
            </select>
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <div class="control">
            <label>SDR Device</label>
            <select id="sdrDeviceSelect"></select>
          </div>
          <div class="control"><button id="scanSdrBtn">Scan SDR</button></div>
          <div class="control"><button id="connectSdrBtn">Connect SDR</button></div>
          <div class="control"><button id="disconnectSdrBtn">Disconnect SDR</button></div>
        </div>
      </div>
    </section>

    <section class="card grid">
      <div class="pane">
        <canvas id="waveform" width="1100" height="180"></canvas>
      </div>
      <div class="pane">
        <canvas id="waterfall" width="1100" height="320"></canvas>
      </div>
      <div class="pane status" id="statusText">
        <span>Mode: None</span>
        <span>Morse: </span>
        <span>Source: Simulated</span>
        <span>Signal: -120.0 dB</span>
        <span>Meshtastic: none</span>
      </div>
    </section>
  </main>

  <script>
    const waveformCanvas = document.getElementById("waveform");
    const waterfallCanvas = document.getElementById("waterfall");
    const waveCtx = waveformCanvas.getContext("2d");
    const wfCtx = waterfallCanvas.getContext("2d");

    const controls = {
      frequency: document.getElementById("frequency"),
      sampleRate: document.getElementById("sampleRate"),
      fftSize: document.getElementById("fftSize"),
      modulation: document.getElementById("modulation"),
      minDb: document.getElementById("minDb"),
      maxDb: document.getElementById("maxDb"),
      squelch: document.getElementById("squelch"),
      morseEnabled: document.getElementById("morseEnabled"),
      bandSelect: document.getElementById("bandSelect"),
      sdrDeviceSelect: document.getElementById("sdrDeviceSelect"),
      scanSdrBtn: document.getElementById("scanSdrBtn"),
      connectSdrBtn: document.getElementById("connectSdrBtn"),
      disconnectSdrBtn: document.getElementById("disconnectSdrBtn"),
      runState: document.getElementById("runState"),
      statusText: document.getElementById("statusText")
    };

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...opts,
      });
      const text = await res.text();
      try { return JSON.parse(text); } catch { return text; }
    }

    function dbToY(v, minDb, maxDb, h) {
      const n = (v - minDb) / (maxDb - minDb);
      return h - Math.max(0, Math.min(1, n)) * h;
    }

    function drawWaveform(data, minDb, maxDb) {
      const w = waveformCanvas.width;
      const h = waveformCanvas.height;
      waveCtx.clearRect(0, 0, w, h);

      waveCtx.strokeStyle = "#2f4256";
      waveCtx.lineWidth = 1;
      for (let i = 1; i <= 4; i++) {
        const y = (h * i) / 5;
        waveCtx.beginPath();
        waveCtx.moveTo(0, y);
        waveCtx.lineTo(w, y);
        waveCtx.stroke();
      }

      if (!Array.isArray(data) || data.length < 2) {
        return;
      }

      waveCtx.strokeStyle = "#2cc7b7";
      waveCtx.lineWidth = 2;
      waveCtx.beginPath();
      for (let i = 0; i < data.length; i++) {
        const x = (i / (data.length - 1)) * w;
        const y = dbToY(data[i], minDb, maxDb, h);
        if (i === 0) {
          waveCtx.moveTo(x, y);
        } else {
          waveCtx.lineTo(x, y);
        }
      }
      waveCtx.stroke();
    }

    function spectralColor(norm) {
      const x = Math.max(0, Math.min(1, norm));
      const r = Math.round(255 * Math.min(1, x * 2));
      const g = Math.round(255 * Math.sin(Math.PI * x));
      const b = Math.round(255 * (1 - x) * (1 - x));
      return [r, g, b];
    }

    function drawWaterfall(matrix, minDb, maxDb) {
      if (!Array.isArray(matrix) || !matrix.length || !Array.isArray(matrix[0])) {
        return;
      }

      const rows = matrix.length;
      const cols = matrix[0].length;
      const image = wfCtx.createImageData(cols, rows);

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const v = matrix[y][x];
          const n = (v - minDb) / (maxDb - minDb);
          const [r, g, b] = spectralColor(n);
          const idx = (y * cols + x) * 4;
          image.data[idx] = r;
          image.data[idx + 1] = g;
          image.data[idx + 2] = b;
          image.data[idx + 3] = 255;
        }
      }

      const offscreen = document.createElement("canvas");
      offscreen.width = cols;
      offscreen.height = rows;
      const offCtx = offscreen.getContext("2d");
      offCtx.putImageData(image, 0, 0);
      wfCtx.clearRect(0, 0, waterfallCanvas.width, waterfallCanvas.height);
      wfCtx.drawImage(offscreen, 0, 0, waterfallCanvas.width, waterfallCanvas.height);
    }

    async function refreshStatus() {
      const s = await api("/api/status");
      controls.runState.textContent = s.running ? "Running" : "Stopped";
      controls.frequency.value = (s.center_freq / 1000000).toFixed(3);
      controls.modulation.value = s.modulation_mode;
      controls.morseEnabled.value = String(s.morse_enabled);
      const meshtasticText = s.meshtastic_devices && s.meshtastic_devices.length
        ? s.meshtastic_devices.map((d) => d.port).join(", ")
        : "none";
      controls.statusText.innerHTML =
        `<span>Mode: ${s.modulation_mode}</span>` +
        `<span>Morse: ${s.morse_text || "(none)"}</span>` +
        `<span>Source: ${s.source}</span>` +
        `<span>Signal: ${Number(s.signal_strength_db).toFixed(1)} dB ${s.signal_detected ? "(active)" : "(quiet)"}</span>` +
        `<span>Meshtastic: ${meshtasticText}</span>` +
        `${s.source_notice ? `<span class="status-warning">${s.source_notice}</span>` : ""}`;

      if (Array.isArray(s.sdr_devices)) {
        const existing = new Set(Array.from(controls.sdrDeviceSelect.options).map((o) => o.value));
        if (existing.size === 0 || existing.size !== s.sdr_devices.length + 1) {
          populateSdrDevices(s.sdr_devices, s.connected_sdr_id);
        }
      }
    }

    function populateSdrDevices(devices, connectedId) {
      controls.sdrDeviceSelect.innerHTML = `<option value="">-- Select SDR --</option>`;
      for (const d of devices) {
        const opt = document.createElement("option");
        opt.value = d.id;
        opt.textContent = `${d.device_type}: ${d.name}`;
        if (connectedId && d.id === connectedId) {
          opt.selected = true;
        }
        controls.sdrDeviceSelect.appendChild(opt);
      }
    }

    async function refreshSdrDevices() {
      const res = await api("/api/sdr_devices");
      const devices = Array.isArray(res.devices) ? res.devices : [];
      populateSdrDevices(devices, res.connected_sdr_id || null);
    }

    async function refreshFrame() {
      const frame = await api("/api/frame");
      drawWaveform(frame.waveform, frame.min_db, frame.max_db);
      drawWaterfall(frame.waterfall, frame.min_db, frame.max_db);
    }

    async function sendConfig() {
      await api("/api/config", {
        method: "POST",
        body: JSON.stringify({
          frequency_mhz: Number(controls.frequency.value),
          sample_rate_hz: Number(controls.sampleRate.value),
          fft_size: Number(controls.fftSize.value),
          modulation_mode: controls.modulation.value,
          min_db: Number(controls.minDb.value),
          max_db: Number(controls.maxDb.value),
          squelch_db: Number(controls.squelch.value),
          morse_enabled: controls.morseEnabled.value === "true",
        }),
      });
    }

    async function loadBands() {
      const bands = await api("/api/bands");
      controls.bandSelect.innerHTML = `<option value="">-- Select Band --</option>`;
      for (const b of bands) {
        const opt = document.createElement("option");
        opt.value = b.name;
        opt.textContent = `${b.name} (${b.mode})`;
        controls.bandSelect.appendChild(opt);
      }
    }

    document.getElementById("startBtn").addEventListener("click", async () => {
      await api("/api/start", { method: "POST" });
      await refreshStatus();
    });

    document.getElementById("stopBtn").addEventListener("click", async () => {
      await api("/api/stop", { method: "POST" });
      await refreshStatus();
    });

    controls.scanSdrBtn.addEventListener("click", async () => {
      await refreshSdrDevices();
      await refreshStatus();
    });

    controls.connectSdrBtn.addEventListener("click", async () => {
      if (!controls.sdrDeviceSelect.value) {
        return;
      }
      await api("/api/connect_sdr", {
        method: "POST",
        body: JSON.stringify({ device_id: controls.sdrDeviceSelect.value }),
      });
      await refreshStatus();
    });

    controls.disconnectSdrBtn.addEventListener("click", async () => {
      await api("/api/disconnect_sdr", { method: "POST" });
      await refreshStatus();
    });

    controls.bandSelect.addEventListener("change", async () => {
      if (!controls.bandSelect.value) return;
      await api("/api/set_band", {
        method: "POST",
        body: JSON.stringify({ band: controls.bandSelect.value }),
      });
      await refreshStatus();
    });

    [
      controls.frequency,
      controls.sampleRate,
      controls.fftSize,
      controls.modulation,
      controls.minDb,
      controls.maxDb,
      controls.squelch,
      controls.morseEnabled,
    ].forEach((el) => {
      el.addEventListener("change", async () => {
        await sendConfig();
      });
    });

    async function loop() {
      await refreshStatus();
      await refreshFrame();
      setTimeout(loop, 120);
    }

    Promise.all([loadBands(), refreshSdrDevices()]).then(loop);
  </script>
</body>
</html>
