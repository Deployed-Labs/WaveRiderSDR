<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveRider SDR (Python)</title>
  <style>
    :root {
      --bg: #0c1116;
      --panel: #16202b;
      --panel-2: #1d2a38;
      --text: #dfe7ef;
      --muted: #9db2c8;
      --accent: #2cc7b7;
      --danger: #f86f57;
      --line: #2f4256;
    }

    :root.light-mode {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --panel-2: #f9f9f9;
      --text: #1a1a1a;
      --muted: #666666;
      --accent: #00a89d;
      --danger: #d84e44;
      --line: #dddddd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top right, #1a2938 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      transition: background-color 200ms ease, color 200ms ease;
    }

    :root.light-mode body {
      background: radial-gradient(circle at top right, #e0e0e0 0%, var(--bg) 55%);
    }

    .layout {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header h2 {
      margin: 0;
      font-size: 0.98rem;
      letter-spacing: 0.04em;
    }

    .pane {
      padding: 12px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: end;
    }

    .control {
      min-width: 150px;
      flex: 1 1 180px;
    }

    .control label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    input, select, button {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #101923;
      color: var(--text);
      padding: 10px;
      font-size: 0.92rem;
    }

    button {
      cursor: pointer;
      font-weight: 600;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-start { background: linear-gradient(135deg, #1aa88f, var(--accent)); }
    .btn-stop { background: linear-gradient(135deg, #d84e44, var(--danger)); }
    .btn-primary { background: linear-gradient(135deg, #0066cc, #0052a3); }
    .btn-danger { background: linear-gradient(135deg, #cc0000, #990000); }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr;
    }

    canvas {
      width: 100%;
      display: block;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--line);
    }

    #waveform { height: 180px; }
    #waterfall { height: 320px; image-rendering: pixelated; }

    .status {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .status-warning {
      width: 100%;
      color: #ffb570;
    }

    .theme-toggle {
      background: linear-gradient(135deg, #2a3f5f, #1a2f4f);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.82rem;
      transition: all 120ms ease;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(44, 199, 183, 0.2);
    }

    .theme-toggle.active {
      background: linear-gradient(135deg, var(--accent), #1aa88f);
      color: #0c1116;
    }

    :root.light-mode .theme-toggle.active {
      background: linear-gradient(135deg, var(--accent), #00a89d);
      color: white;
    }

    .search-container {
      position: relative;
    }

    .band-search {
      width: 100%;
    }

    .band-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-top: none;
      border-radius: 0 0 8px 8px;
      max-height: 250px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
    }

    .band-dropdown.show {
      display: block;
    }

    .band-option {
      padding: 10px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--line);
      color: var(--text);
      font-size: 0.88rem;
    }

    .band-option:hover {
      background: var(--panel-2);
    }

    .band-option.selected {
      background: var(--accent);
      color: var(--bg);
    }

    .center-freq-btn {
      background: linear-gradient(135deg, #3a7f7f, #2a6f6f);
      border: 1px solid var(--accent);
    }

    .center-freq-btn:hover {
      box-shadow: inset 0 0 8px rgba(44, 199, 183, 0.3);
    }

    .connection-info {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .connection-info.connected {
      border-color: var(--accent);
      background: linear-gradient(135deg, rgba(44, 199, 183, 0.05), rgba(44, 199, 183, 0.02));
    }

    .connection-info strong {
      color: var(--accent);
    }

    .log-panel {
      background: #05090f;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    :root.light-mode .log-panel {
      background: #fafafa;
    }

    .log-header {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
      align-items: center;
    }

    .log-filter {
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font-size: 0.78rem;
      flex: 0 1 auto;
    }

    .log-filter.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .log-messages {
      height: 200px;
      overflow-y: auto;
      font-family: "Courier New", monospace;
      font-size: 0.78rem;
      padding: 10px;
      background: var(--panel);
    }

    .log-entry {
      margin-bottom: 4px;
      padding: 4px;
      border-left: 3px solid transparent;
      color: var(--muted);
    }

    .log-entry.debug {
      border-left-color: #6b7280;
      color: #6b7280;
    }

    .log-entry.info {
      border-left-color: var(--accent);
      color: var(--accent);
    }

    .log-entry.warning {
      border-left-color: #ffb570;
      color: #ffb570;
    }

    .log-entry.error {
      border-left-color: var(--danger);
      color: var(--danger);
    }

    .log-clear-btn {
      padding: 6px 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.78rem;
      margin-left: auto;
    }

    .log-clear-btn:hover {
      background: var(--panel-2);
    }

    @media (max-width: 760px) {
      .layout { margin: 12px auto; }
      #waveform { height: 150px; }
      #waterfall { height: 250px; }
      .log-messages { height: 150px; }
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="card">
      <div class="card-header">
        <h2>WaveRider SDR (Python Web)</h2>
        <div style="display: flex; gap: 12px; align-items: center;">
          <div id="runState">Stopped</div>
          <button id="themeToggle" class="theme-toggle">🌙 Dark</button>
        </div>
      </div>
      <div class="pane" id="connectionInfo" style="margin-bottom: 12px; display: none;">
      </div>
      <div class="pane">
        <div class="row">
          <div class="control">
            <label>Band (Search)</label>
            <div class="search-container">
              <input id="bandSearch" type="text" placeholder="Search bands..." class="band-search" />
              <div id="bandDropdown" class="band-dropdown"></div>
            </div>
          </div>
          <div class="control">
            <label>Center Frequency (MHz)</label>
            <input id="frequency" type="number" step="0.1" value="100" />
          </div>
          <div class="control"><button id="centerFreqBtn" class="center-freq-btn">📍 Center</button></div>
          <div class="control">
            <label>Sample Rate (Hz)</label>
            <select id="sampleRate">
              <option value="2400000">2.4M (RTL-SDR)</option>
              <option value="2048000">2.048M</option>
              <option value="1200000">1.2M</option>
              <option value="1024000">1.024M</option>
              <option value="960000">960k</option>
              <option value="500000">500k</option>
            </select>
          </div>
          <div class="control">
            <label>FFT Size</label>
            <select id="fftSize">
              <option>512</option>
              <option selected>1024</option>
              <option>2048</option>
              <option>4096</option>
            </select>
          </div>
          <div class="control">
            <label>Modulation</label>
            <select id="modulation">
              <option>None</option>
              <option>AM</option>
              <option>FM</option>
              <option>USB</option>
              <option>LSB</option>
              <option>CW</option>
            </select>
          </div>
          <div class="control">
            <label>Bandwidth <span id="bandwidthLabel" style="color:var(--accent); font-weight:600;">Off</span></label>
            <input id="bandwidth" type="range" min="0" max="500000" step="500" value="0" style="width:120px;" />
          </div>
          <div class="control" style="align-self:flex-end;">
            <button id="bwDefaultBtn" style="font-size:11px; padding:4px 8px;">Mode Default</button>
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <div class="control"><button id="startBtn" class="btn-start">Start</button></div>
          <div class="control"><button id="stopBtn" class="btn-stop">Stop</button></div>
          <div class="control"><button id="recordBtn" class="btn-primary">🔴 Record</button></div>
          <div class="control"><button id="stopRecordBtn" class="btn-danger" style="display:none;">⏹ Stop Record</button></div>
          <div id="recordStatus" style="display:none; padding: 8px; background: #f0f0f0; border-radius: 4px; font-size: 12px;"></div>
        </div>

        <div class="row" style="margin-top:12px;">
            <label>Min dB</label>
            <input id="minDb" type="number" value="-80" />
          </div>
          <div class="control">
            <label>Max dB</label>
            <input id="maxDb" type="number" value="0" />
          </div>
          <div class="control">
            <label>Squelch dB</label>
            <input id="squelch" type="number" value="-50" />
          </div>
          <div class="control">
            <label>Morse Decoder</label>
            <select id="morseEnabled">
              <option value="false">Disabled</option>
              <option value="true">Enabled</option>
            </select>
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <div class="control">
            <label>SDR Device</label>
            <select id="sdrDeviceSelect"></select>
          </div>
          <div class="control"><button id="scanSdrBtn">Scan SDR</button></div>
          <div class="control"><button id="connectSdrBtn">Connect SDR</button></div>
          <div class="control"><button id="disconnectSdrBtn">Disconnect SDR</button></div>
        </div>
      </div>
    </section>

    <section class="card grid">
      <div class="pane">
        <canvas id="waveform" width="1100" height="180"></canvas>
      </div>
      <div class="pane">
        <canvas id="waterfall" width="1100" height="320"></canvas>
      </div>
      <div class="pane status" id="statusText">
        <span>Mode: None</span>
        <span>Morse: </span>
        <span>Source: Simulated</span>
        <span>Signal: -120.0 dB</span>
        <span>Meshtastic: none</span>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Log Messages</h2>
      </div>
      <div class="log-header">
        <button class="log-filter active" data-level="*">All</button>
        <button class="log-filter" data-level="debug">Debug</button>
        <button class="log-filter" data-level="info">Info</button>
        <button class="log-filter" data-level="warning">Warning</button>
        <button class="log-filter" data-level="error">Error</button>
        <button class="log-clear-btn" id="logClearBtn">Clear</button>
      </div>
      <div class="log-messages" id="logMessages"></div>
    </section>
  </main>

  <script>
    // ========== Theme Management ==========
    const themeToggle = document.getElementById("themeToggle");
    const html = document.documentElement;
    const savedTheme = localStorage.getItem("theme") || "dark";
    
    function setTheme(theme) {
      if (theme === "light") {
        html.classList.add("light-mode");
        themeToggle.textContent = "☀️ Light";
        localStorage.setItem("theme", "light");
      } else {
        html.classList.remove("light-mode");
        themeToggle.textContent = "🌙 Dark";
        localStorage.setItem("theme", "dark");
      }
    }
    
    setTheme(savedTheme);
    themeToggle.addEventListener("click", () => {
      const isLight = html.classList.contains("light-mode");
      setTheme(isLight ? "dark" : "light");
    });

    // ========== Canvas & Controls ==========
    const waveformCanvas = document.getElementById("waveform");
    const waterfallCanvas = document.getElementById("waterfall");
    const waveCtx = waveformCanvas.getContext("2d");
    const wfCtx = waterfallCanvas.getContext("2d");

    // Get CSS variables for current theme
    function getThemeColors() {
      const root = document.documentElement;
      const style = getComputedStyle(root);
      return {
        bg: style.getPropertyValue("--bg").trim() || "#0c1116",
        panel: style.getPropertyValue("--panel").trim() || "#16202b",
        line: style.getPropertyValue("--line").trim() || "#2f4256",
        accent: style.getPropertyValue("--accent").trim() || "#2cc7b7",
        text: style.getPropertyValue("--text").trim() || "#dfe7ef"
      };
    }

    const controls = {
      frequency: document.getElementById("frequency"),
      sampleRate: document.getElementById("sampleRate"),
      fftSize: document.getElementById("fftSize"),
      modulation: document.getElementById("modulation"),
      bandwidth: document.getElementById("bandwidth"),
      bandwidthLabel: document.getElementById("bandwidthLabel"),
      bwDefaultBtn: document.getElementById("bwDefaultBtn"),
      minDb: document.getElementById("minDb"),
      maxDb: document.getElementById("maxDb"),
      squelch: document.getElementById("squelch"),
      morseEnabled: document.getElementById("morseEnabled"),
      bandSearch: document.getElementById("bandSearch"),
      bandDropdown: document.getElementById("bandDropdown"),
      sdrDeviceSelect: document.getElementById("sdrDeviceSelect"),
      scanSdrBtn: document.getElementById("scanSdrBtn"),
      connectSdrBtn: document.getElementById("connectSdrBtn"),
      disconnectSdrBtn: document.getElementById("disconnectSdrBtn"),
      centerFreqBtn: document.getElementById("centerFreqBtn"),
      runState: document.getElementById("runState"),
      statusText: document.getElementById("statusText"),
      connectionInfo: document.getElementById("connectionInfo"),
      logMessages: document.getElementById("logMessages"),
      logClearBtn: document.getElementById("logClearBtn")
    };

    // ========== Band Management ==========
    let allBands = [];
    
    function showBandDropdown(search = "") {
      const filtered = allBands.filter(b => 
        (b.name + " " + b.mode).toLowerCase().includes(search.toLowerCase())
      );
      
      controls.bandDropdown.innerHTML = filtered
        .map(b => `<div class="band-option" data-band="${b.name}">${b.name} (${b.mode}) - ${(b.start_hz/1e6).toFixed(1)}-${(b.end_hz/1e6).toFixed(1)} MHz</div>`)
        .join("");
      
      controls.bandDropdown.classList.add("show");
      
      document.querySelectorAll(".band-option").forEach(opt => {
        opt.addEventListener("click", async () => {
          controls.bandSearch.value = opt.getAttribute("data-band");
          controls.bandDropdown.classList.remove("show");
          await api("/api/set_band", {
            method: "POST",
            body: JSON.stringify({ band: opt.getAttribute("data-band") }),
          });
          await refreshStatus();
        });
      });
    }
    
    controls.bandSearch.addEventListener("input", (e) => {
      showBandDropdown(e.target.value);
    });
    
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".search-container")) {
        controls.bandDropdown.classList.remove("show");
      }
    });

    // ========== Log System ==========
    let logs = [];
    let logFilter = "*";
    
    function addLog(level, message) {
      const timestamp = new Date().toLocaleTimeString();
      logs.unshift({ level, message, timestamp });
      if (logs.length > 100) logs.pop();
      updateLogDisplay();
    }
    
    function updateLogDisplay() {
      const filtered = logFilter === "*" ? logs : logs.filter(l => l.level === logFilter);
      controls.logMessages.innerHTML = filtered
        .map(l => `<div class="log-entry ${l.level}">[${l.timestamp}] ${l.level.toUpperCase()}: ${l.message}</div>`)
        .join("");
      controls.logMessages.scrollTop = 0;
    }
    
    document.querySelectorAll(".log-filter").forEach(btn => {
      btn.addEventListener("click", (e) => {
        document.querySelectorAll(".log-filter").forEach(b => b.classList.remove("active"));
        e.target.classList.add("active");
        logFilter = e.target.getAttribute("data-level");
        updateLogDisplay();
      });
    });
    
    controls.logClearBtn.addEventListener("click", () => {
      logs = [];
      updateLogDisplay();
    });
    
    // Add initial info log
    addLog("info", "WaveRider SDR initialized");

    // ========== Connection Info Display ==========
    let lastConnectedId = null;
    
    function updateConnectionInfo(status) {
      const sdrName = status.connected_sdr_id ? `Connected to: ${status.connected_sdr_id}` : "No SDR connected (using simulation)";
      const isConnected = !!status.connected_sdr_id;
      
      controls.connectionInfo.innerHTML = `
        <strong>${isConnected ? "✓ " : "⚠ "}Device Status:</strong> ${sdrName}
        <br><strong>Sample Rate:</strong> ${(status.sample_rate / 1e6).toFixed(2)} MHz | 
        <strong>Center Freq:</strong> ${(status.center_freq / 1e6).toFixed(3)} MHz
      `;
      controls.connectionInfo.classList.toggle("connected", isConnected);
      
      // Track connection changes
      if (isConnected && status.connected_sdr_id !== lastConnectedId) {
        lastConnectedId = status.connected_sdr_id;
        controls.connectionInfo.style.display = "block";
      } else if (!isConnected && lastConnectedId) {
        lastConnectedId = null;
        controls.connectionInfo.style.display = "block";
      } else if (isConnected) {
        controls.connectionInfo.style.display = "block";
      }
    }

    // ========== Center Tuner ==========
    controls.centerFreqBtn.addEventListener("click", () => {
      const bandName = controls.bandSearch.value;
      const selectedBand = allBands.find(b => b.name === bandName);
      if (selectedBand) {
        const centerMhz = selectedBand.center_hz / 1e6;
        controls.frequency.value = centerMhz.toFixed(3);
        addLog("info", `Centered on ${bandName}: ${centerMhz.toFixed(3)} MHz`);
        sendConfig();
      } else {
        addLog("warning", "Please select a band first");
      }
    });

    async function api(path, opts = {}) {
      try {
        const res = await fetch(path, {
          headers: { "Content-Type": "application/json" },
          ...opts,
        });
        const text = await res.text();
        try { 
          const json = JSON.parse(text);
          if (!res.ok && json.error) {
            addLog("error", `API error: ${json.error}`);
          }
          return json;
        } catch { 
          return text; 
        }
      } catch (err) {
        addLog("error", `Network error: ${err.message}`);
        throw err;
      }
    }

    function dbToY(v, minDb, maxDb, h) {
      const n = (v - minDb) / (maxDb - minDb);
      return h - Math.max(0, Math.min(1, n)) * h;
    }

    function drawWaveform(data, minDb, maxDb) {
      const colors = getThemeColors();
      const w = waveformCanvas.width;
      const h = waveformCanvas.height;
      waveCtx.clearRect(0, 0, w, h);

      waveCtx.strokeStyle = colors.line;
      waveCtx.lineWidth = 1;
      for (let i = 1; i <= 4; i++) {
        const y = (h * i) / 5;
        waveCtx.beginPath();
        waveCtx.moveTo(0, y);
        waveCtx.lineTo(w, y);
        waveCtx.stroke();
      }

      if (!Array.isArray(data) || data.length < 2) {
        return;
      }

      waveCtx.strokeStyle = colors.accent;
      waveCtx.lineWidth = 2;
      waveCtx.beginPath();
      for (let i = 0; i < data.length; i++) {
        const x = (i / (data.length - 1)) * w;
        const y = dbToY(data[i], minDb, maxDb, h);
        if (i === 0) {
          waveCtx.moveTo(x, y);
        } else {
          waveCtx.lineTo(x, y);
        }
      }
      waveCtx.stroke();
    }

    function spectralColor(norm) {
      const x = Math.max(0, Math.min(1, norm));
      const r = Math.round(255 * Math.min(1, x * 2));
      const g = Math.round(255 * Math.sin(Math.PI * x));
      const b = Math.round(255 * (1 - x) * (1 - x));
      return [r, g, b];
    }

    function drawWaterfall(matrix, minDb, maxDb) {
      const colors = getThemeColors();
      if (!Array.isArray(matrix) || !matrix.length || !Array.isArray(matrix[0])) {
        // Clear with background color
        const w = waterfallCanvas.width;
        const h = waterfallCanvas.height;
        wfCtx.fillStyle = colors.bg;
        wfCtx.fillRect(0, 0, w, h);
        return;
      }

      const rows = matrix.length;
      const cols = matrix[0].length;
      const image = wfCtx.createImageData(cols, rows);

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const v = matrix[y][x];
          const n = (v - minDb) / (maxDb - minDb);
          const [r, g, b] = spectralColor(n);
          const idx = (y * cols + x) * 4;
          image.data[idx] = r;
          image.data[idx + 1] = g;
          image.data[idx + 2] = b;
          image.data[idx + 3] = 255;
        }
      }

      const offscreen = document.createElement("canvas");
      offscreen.width = cols;
      offscreen.height = rows;
      const offCtx = offscreen.getContext("2d");
      offCtx.putImageData(image, 0, 0);
      wfCtx.clearRect(0, 0, waterfallCanvas.width, waterfallCanvas.height);
      wfCtx.drawImage(offscreen, 0, 0, waterfallCanvas.width, waterfallCanvas.height);
    }

    async function refreshStatus() {
      const s = await api("/api/status");
      controls.runState.textContent = s.running ? "Running" : "Stopped";
      controls.frequency.value = (s.center_freq / 1000000).toFixed(3);
      controls.modulation.value = s.modulation_mode;
      controls.morseEnabled.value = String(s.morse_enabled);
      const meshtasticText = s.meshtastic_devices && s.meshtastic_devices.length
        ? s.meshtastic_devices.map((d) => d.port).join(", ")
        : "none";
      controls.statusText.innerHTML =
        `<span>Mode: ${s.modulation_mode}</span>` +
        `<span>Morse: ${s.morse_text || "(none)"}</span>` +
        `<span>Source: ${s.source}</span>` +
        `<span>Signal: ${Number(s.signal_strength_db).toFixed(1)} dB ${s.signal_detected ? "(active)" : "(quiet)"}</span>` +
        `<span>Meshtastic: ${meshtasticText}</span>` +
        `${s.source_notice ? `<span class="status-warning">${s.source_notice}</span>` : ""}`;

      updateConnectionInfo(s);

      if (Array.isArray(s.sdr_devices)) {
        const existing = new Set(Array.from(controls.sdrDeviceSelect.options).map((o) => o.value));
        if (existing.size === 0 || existing.size !== s.sdr_devices.length + 1) {
          populateSdrDevices(s.sdr_devices, s.connected_sdr_id);
        }
      }
    }

    function populateSdrDevices(devices, connectedId) {
      controls.sdrDeviceSelect.innerHTML = `<option value="">-- Select SDR --</option>`;
      for (const d of devices) {
        const opt = document.createElement("option");
        opt.value = d.id;
        opt.textContent = `${d.device_type}: ${d.name}`;
        if (connectedId && d.id === connectedId) {
          opt.selected = true;
        }
        controls.sdrDeviceSelect.appendChild(opt);
      }
    }

    async function refreshSdrDevices() {
      const res = await api("/api/sdr_devices");
      const devices = Array.isArray(res.devices) ? res.devices : [];
      populateSdrDevices(devices, res.connected_sdr_id || null);
    }

    async function refreshFrame() {
      const frame = await api("/api/frame");
      drawWaveform(frame.waveform, frame.min_db, frame.max_db);
      drawWaterfall(frame.waterfall, frame.min_db, frame.max_db);
    }

    async function sendConfig() {
      const response = await fetch("/api/config", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          frequency_mhz: Number(controls.frequency.value),
          sample_rate_hz: Number(controls.sampleRate.value),
          fft_size: Number(controls.fftSize.value),
          modulation_mode: controls.modulation.value,
          min_db: Number(controls.minDb.value),
          max_db: Number(controls.maxDb.value),
          squelch_db: Number(controls.squelch.value),
          morse_enabled: controls.morseEnabled.value === "true",
          bandwidth_hz: Number(controls.bandwidth.value),
        }),
      });
      
      const result = await response.json();
      if (!result.ok) {
        addLog("error", `Config error: ${result.error || "Unknown error"}`);
      }
    }

    async function loadBands() {
      const bands = await api("/api/bands");
      allBands = bands;
      addLog("info", `Loaded ${bands.length} band presets`);
    }

    document.getElementById("startBtn").addEventListener("click", async () => {
      await api("/api/start", { method: "POST" });
      addLog("info", "SDR started");
      await refreshStatus();
    });

    document.getElementById("stopBtn").addEventListener("click", async () => {
      await api("/api/stop", { method: "POST" });
      addLog("info", "SDR stopped");
      await refreshStatus();
    });

    // Bandwidth Filter
    const MODE_BW_DEFAULTS = { None: 0, AM: 6000, FM: 200000, USB: 3000, LSB: 3000, CW: 500 };

    function formatBandwidth(hz) {
      if (!hz || hz === 0) return "Off";
      if (hz >= 1000000) return `${(hz / 1000000).toFixed(2)} MHz`;
      if (hz >= 1000) return `${(hz / 1000).toFixed(1)} kHz`;
      return `${hz} Hz`;
    }

    function updateBandwidthLabel() {
      const val = Number(controls.bandwidth.value);
      controls.bandwidthLabel.textContent = formatBandwidth(val);
    }

    controls.bandwidth.addEventListener("input", () => {
      updateBandwidthLabel();
      sendConfig();
    });

    controls.bwDefaultBtn.addEventListener("click", () => {
      const mode = controls.modulation.value;
      const defaultBw = MODE_BW_DEFAULTS[mode] ?? 0;
      controls.bandwidth.value = defaultBw;
      updateBandwidthLabel();
      sendConfig();
      addLog("info", `Bandwidth set to mode default: ${formatBandwidth(defaultBw)}`);
    });

    // Also update bandwidth range max on modulation change
    controls.modulation.addEventListener("change", () => {
      const mode = controls.modulation.value;
      // Adjust slider max based on mode
      if (mode === "FM") {
        controls.bandwidth.max = 500000;
        controls.bandwidth.step = 5000;
      } else if (mode === "AM") {
        controls.bandwidth.max = 50000;
        controls.bandwidth.step = 500;
      } else if (mode === "USB" || mode === "LSB") {
        controls.bandwidth.max = 10000;
        controls.bandwidth.step = 100;
      } else if (mode === "CW") {
        controls.bandwidth.max = 5000;
        controls.bandwidth.step = 50;
      } else {
        controls.bandwidth.max = 500000;
        controls.bandwidth.step = 500;
      }
      updateBandwidthLabel();
    });

    // Audio Recording
    let recordingStatus = null;
    let recordingCheckInterval = null;

    async function updateRecordingStatus() {
      try {
        const response = await fetch("/api/record/status");
        recordingStatus = await response.json();
        
        const recordBtn = document.getElementById("recordBtn");
        const stopRecordBtn = document.getElementById("stopRecordBtn");
        const recordStatusDiv = document.getElementById("recordStatus");
        
        if (recordingStatus.recording) {
          recordBtn.style.display = "none";
          stopRecordBtn.style.display = "inline-block";
          recordStatusDiv.style.display = "inline-block";
          
          const duration = recordingStatus.duration_seconds.toFixed(1);
          const size = recordingStatus.file_size_mb.toFixed(2);
          recordStatusDiv.textContent = `Recording: ${recordingStatus.filename} | ${duration}s | ${size}MB`;
        } else {
          recordBtn.style.display = "inline-block";
          stopRecordBtn.style.display = "none";
          recordStatusDiv.style.display = "none";
        }
      } catch (e) {
        console.log("Recording status check skipped");
      }
    }

    document.getElementById("recordBtn").addEventListener("click", async () => {
      try {
        const response = await api("/api/record/start", { method: "POST" });
        if (response.ok) {
          addLog("info", `Recording started: ${response.filename}`);
          
          // Start checking recording status every 500ms
          if (recordingCheckInterval) clearInterval(recordingCheckInterval);
          recordingCheckInterval = setInterval(updateRecordingStatus, 500);
          
          updateRecordingStatus();
        } else {
          addLog("error", `Recording failed: ${response.error}`);
        }
      } catch (e) {
        addLog("error", `Recording error: ${e.message}`);
      }
    });

    document.getElementById("stopRecordBtn").addEventListener("click", async () => {
      try {
        const response = await api("/api/record/stop", { method: "POST" });
        if (response.ok) {
          addLog("info", response.message);
        } else {
          addLog("error", `Stop recording failed: ${response.error}`);
        }
        
        if (recordingCheckInterval) clearInterval(recordingCheckInterval);
        updateRecordingStatus();
      } catch (e) {
        addLog("error", `Stop recording error: ${e.message}`);
      }
    });

    controls.scanSdrBtn.addEventListener("click", async () => {
      addLog("info", "Scanning for SDR devices...");
      await refreshSdrDevices();
      await refreshStatus();
    });

    controls.connectSdrBtn.addEventListener("click", async () => {
      if (!controls.sdrDeviceSelect.value) {
        addLog("warning", "Please select an SDR device first");
        return;
      }
      addLog("info", `Connecting to ${controls.sdrDeviceSelect.value}...`);
      await api("/api/connect_sdr", {
        method: "POST",
        body: JSON.stringify({ device_id: controls.sdrDeviceSelect.value }),
      });
      await refreshStatus();
    });

    controls.disconnectSdrBtn.addEventListener("click", async () => {
      addLog("info", "Disconnecting SDR...");
      await api("/api/disconnect_sdr", { method: "POST" });
      await refreshStatus();
    });

    [
      controls.frequency,
      controls.sampleRate,
      controls.fftSize,
      controls.modulation,
      controls.minDb,
      controls.maxDb,
      controls.squelch,
      controls.morseEnabled,
    ].forEach((el) => {
      el.addEventListener("change", async () => {
        await sendConfig();
      });
    });

    async function loop() {
      await refreshStatus();
      await refreshFrame();
      setTimeout(loop, 120);
    }

    Promise.all([loadBands(), refreshSdrDevices()]).then(loop);
  </script>
</body>
</html>
