name: Windows Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          git fetch origin main --force
          $remoteBranches = git branch -r --contains $env:GITHUB_SHA
          if ($remoteBranches -notmatch 'origin/main') {
            $message = "Tag $env:GITHUB_REF_NAME does not point to a commit on main. Version tags are only allowed from main."
            "## Release Blocked" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "- Reason: $message" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "- Fix: Create and push the version tag from a commit that is on main." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            Write-Host "::error::$message"
            exit 1
          }

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows executable
        run: cargo build --release --locked

      - name: Package executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Copy-Item target/release/waverider_sdr.exe release-assets/
          Compress-Archive -Path release-assets/waverider_sdr.exe -DestinationPath release-assets/waverider_sdr-${{ github.ref_name }}-windows-x64.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: waverider_sdr-${{ github.ref_name }}-windows-x64
          path: release-assets/waverider_sdr-${{ github.ref_name }}-windows-x64.zip

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: WaveRider SDR ${{ github.ref_name }}
          files: |
            release-assets/waverider_sdr-${{ github.ref_name }}-windows-x64.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'a') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
