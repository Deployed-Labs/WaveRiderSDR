name: Windows Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create next patch tag on main
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          git fetch --tags --force

          $headTags = git tag --points-at HEAD | Where-Object { $_ -match '^v\d+\.\d+\.\d+$' }
          if ($headTags) {
            $existing = $headTags | Select-Object -First 1
            Write-Host "Semantic version tag already exists on this commit: $existing"
            "AUTO_TAG=$existing" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            exit 0
          }

          $latest = git tag --list "v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($latest)) {
            $nextTag = "v0.0.1"
          } else {
            if ($latest -notmatch '^v(\d+)\.(\d+)\.(\d+)$') {
              throw "Latest semantic version tag is invalid: $latest"
            }
            $major = [int]$Matches[1]
            $minor = [int]$Matches[2]
            $patch = [int]$Matches[3] + 1
            $nextTag = "v$major.$minor.$patch"
          }

          git tag $nextTag
          git push origin $nextTag
          Write-Host "Created and pushed tag $nextTag"
          "AUTO_TAG=$nextTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Enforce patch increment for tag releases
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          git fetch --tags --force

          $current = "$env:GITHUB_REF_NAME"
          if ($current -notmatch '^v(\d+)\.(\d+)\.(\d+)$') {
            throw "Tag '$current' is invalid. Expected format vMAJOR.MINOR.PATCH (example: v0.0.1)."
          }

          $currMajor = [int]$Matches[1]
          $currMinor = [int]$Matches[2]
          $currPatch = [int]$Matches[3]

          $previous = git tag --list "v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname |
            Where-Object { $_ -ne $current } |
            Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($previous)) {
            if ($current -ne "v0.0.1") {
              throw "First release tag must be v0.0.1 when enforcing +0.0.1 patch increments."
            }
            exit 0
          }

          if ($previous -notmatch '^v(\d+)\.(\d+)\.(\d+)$') {
            throw "Previous semantic version tag is invalid: $previous"
          }

          $prevMajor = [int]$Matches[1]
          $prevMinor = [int]$Matches[2]
          $prevPatch = [int]$Matches[3]

          $expectedTag = "v$prevMajor.$prevMinor.$($prevPatch + 1)"
          if ($current -ne $expectedTag) {
            throw "Invalid tag sequence: previous=$previous, current=$current, expected=$expectedTag (must increase by 0.0.1)."
          }

          if ($currMajor -ne $prevMajor -or $currMinor -ne $prevMinor) {
            throw "Major/minor changes are not allowed. Tags must increase only by 0.0.1."
          }

      - name: Ensure tag commit is on main
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          git fetch origin main --force
          $remoteBranches = git branch -r --contains $env:GITHUB_SHA
          if ($remoteBranches -notmatch 'origin/main') {
            $message = "Tag $env:GITHUB_REF_NAME does not point to a commit on main. Version tags are only allowed from main."
            "## Release Blocked" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "- Reason: $message" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "- Fix: Create and push the version tag from a commit that is on main." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            Write-Host "::error::$message"
            exit 1
          }

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows executable
        run: cargo build --release --locked

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "main-${{ github.sha }}".Substring(0, 17) }
          $packageName = "waverider_sdr-portable-$version-windows-x64"
          $packageRoot = Join-Path "release-assets" $packageName

          New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null
          Copy-Item "target/release/waverider_sdr.exe" $packageRoot
          Copy-Item "templates" (Join-Path $packageRoot "templates") -Recurse -Force

          if (Test-Path "README.md") { Copy-Item "README.md" $packageRoot }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" $packageRoot }

          @"
          @echo off
          setlocal
          cd /d "%~dp0"
          waverider_sdr.exe --mode desktop
          "@ | Set-Content -Path (Join-Path $packageRoot "run-gui.bat") -Encoding ascii

          @"
          @echo off
          setlocal
          cd /d "%~dp0"
          set HOST=0.0.0.0
          set PORT=5000
          if not "%~1"=="" set PORT=%~1
          waverider_sdr.exe --mode web --host %HOST% --port %PORT%
          "@ | Set-Content -Path (Join-Path $packageRoot "run-web.bat") -Encoding ascii

          Compress-Archive -Path $packageRoot -DestinationPath "release-assets/$packageName.zip" -Force
          "PACKAGE_NAME=$packageName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: release-assets/${{ env.PACKAGE_NAME }}.zip

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: WaveRider SDR ${{ github.ref_name }}
          files: |
            release-assets/${{ env.PACKAGE_NAME }}.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'a') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
